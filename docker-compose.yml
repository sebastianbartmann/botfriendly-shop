services:
  botfriendly.shop:
    container_name: botfriendly.shop
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8084:8084"
    environment:
      BOTFRIENDLY_SHOP_LOG_FORMAT: json
      BOTFRIENDLY_SHOP_DB_PATH: /data/botfriendly_shop.db
      ADMIN_USERNAME: ${ADMIN_USERNAME:?set ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?set ADMIN_PASSWORD}
    volumes:
      - botfriendly_shop_data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8084/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    mem_limit: 512m
    cpus: 1.0
    restart: unless-stopped

volumes:
  botfriendly_shop_data:
