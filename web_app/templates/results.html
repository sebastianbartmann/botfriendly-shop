<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Check how ready your ecommerce site is for AI agents, crawlers, and bots. Free scan with actionable recommendations." />
  <meta property="og:title" content="{{ og_title or 'Scan Results — botfriendly.shop' }}" />
  <meta property="og:description" content="Scan your ecommerce site and get an AI-readiness score. Find gaps in structured data, robots.txt, sitemaps, and more." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://botfriendly.shop" />
  <title>Scan Results — botfriendly.shop</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <main class="container" data-scan-id="{{ scan_id }}" data-check-count="{{ check_count }}">
    <nav class="top-nav card">
      <a href="/">Home</a>
      <a href="/stats">Stats</a>
      <a href="/bots">Bots</a>
    </nav>

    <header class="results-header card">
      <h1>Scanning: <span class="url">{{ url }}</span></h1>
      <a class="secondary-link" href="/">Scan another site</a>
    </header>

    <section class="card overall-card">
      <div>
        <p class="muted">Overall Score</p>
        <div class="overall-row">
          <div id="grade" class="grade pending">...</div>
          <div class="score-wrap">
            <div class="score-track">
              <div id="overall-score-bar" class="score-fill" style="width: 0%;"></div>
            </div>
            <p id="overall-score-text" class="score-text">Running checks...</p>
          </div>
        </div>
      </div>
    </section>

    <section>
      <div id="loading-state" class="loading">
        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
        <span>Running checks in real time...</span>
      </div>
      <div id="check-grid" class="check-grid"></div>
      <div id="error-box" class="error hidden"></div>
    </section>
  </main>

  <footer class="site-footer">botfriendly.shop · built by Sebastian Bartmann</footer>

  <script>
    window.SCAN_CONTEXT = {
      scanId: "{{ scan_id }}",
      checkCount: Number("{{ check_count }}"),
      preloadedComplete: {{ preloaded_complete|tojson }},
      preloadedResults: {{ preloaded_results|tojson }},
      preloadedOverall: {{ preloaded_overall|tojson }},
      preloadedGrade: {{ preloaded_grade|tojson }},
      labels: {
        robots: "Robots.txt AI Bot Access",
        discovery: "AI Discovery Files",
        sitemap: "Sitemap Quality",
        structured_data: "Structured Data",
        seo_meta: "SEO Metadata",
        feeds: "Product Feed Availability",
        api_surface: "API Surface",
        product_parseability: "Product Parseability"
      }
    };
  </script>
  <script src="/static/app.js"></script>
</body>
</html>
